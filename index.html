<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center
            min-height: 1000000vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f2f5 100%);
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px 40px;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        h1 {
            color: #1a202c;
            margin-bottom: 20px;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            color: #2d3748;
        }

        .score-box, .best-box {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 24px 40px;
            border-radius: 16px;
            font-size: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .score-box:hover, .best-box:hover {
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            transform: translateY(-4px);
        }

        .score-box h3, .best-box h3 {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .score-box p, .best-box p {
            font-size: 32px;
            font-weight: 700;
            color: #0f172a;
        }

        .game-board {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            border-radius: 20px;
            padding: 14px;
            width: 340px;
            height: 340px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 12px;
            margin: 0 auto 30px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .tile-container {
            background: linear-gradient(135deg, #d1d5db 0%, #cbd5e1 100%);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            min-height: 70px;
            perspective: 1000px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.08);
        }

        .tile-wrapper {
            width: 100%;
            height: 100%;
            transition: opacity 0.1s ease-in-out;
        }

        .tile-wrapper.animate {
            animation: slideIn 0.15s ease-out;
        }

        @keyframes slideIn {
            0% {
                opacity: 0.7;
            }
            100% {
                opacity: 1;
            }
        }

        .tile {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: 700;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .tile-2 { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); color: #475569; font-weight: 800; }
        .tile-4 { background: linear-gradient(135deg, #fef3c7 0%, #fcd34d 100%); color: #78350f; font-weight: 800; }
        .tile-8 { background: linear-gradient(135deg, #dcfce7 0%, #86efac 100%); color: #166534; font-weight: 800; }
        .tile-16 { background: linear-gradient(135deg, #fed7aa 0%, #fb923c 100%); color: #7c2d12; font-weight: 800; }
        .tile-32 { background: linear-gradient(135deg, #fbcfe8 0%, #f472b6 100%); color: #831843; font-weight: 800; }
        .tile-64 { background: linear-gradient(135deg, #f5d4e6 0%, #ec4899 100%); color: #500724; font-weight: 800; }
        .tile-128 { background: linear-gradient(135deg, #fecaca 0%, #f87171 100%); color: #7f1d1d; font-size: 30px; font-weight: 800; }
        .tile-256 { background: linear-gradient(135deg, #fed7aa 0%, #f97316 100%); color: #5a2d0c; font-size: 30px; font-weight: 800; }
        .tile-512 { background: linear-gradient(135deg, #fdba74 0%, #ea580c 100%); color: #fff; font-size: 30px; font-weight: 800; }
        .tile-1024 { background: linear-gradient(135deg, #f97316 0%, #c2410c 100%); color: #fff; font-size: 25px; font-weight: 800; }
        .tile-2048 { background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); color: white; font-size: 25px; font-weight: 800; }
        .tile-4096 { background: linear-gradient(135deg, #a855f7 0%, #6d28d9 100%); color: white; font-size: 20px; font-weight: 800; }
        .tile-8192 { background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: white; font-size: 20px; font-weight: 800; }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 14px 32px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        #newGameBtn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        #newGameBtn:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        #newGameBtn:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        #undoBtn {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            color: white;
        }

        #undoBtn:hover {
            background: linear-gradient(135deg, #4b5563 0%, #374151 100%);
            box-shadow: 0 12px 24px rgba(75, 85, 99, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        #undoBtn:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(75, 85, 99, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            color: #1a202c;
            padding: 48px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
            min-width: 320px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid #e2e8f0;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #0f172a;
        }

        .game-over p {
            font-size: 18px;
            margin-bottom: 20px;
            color: #4b5563;
        }

        .game-over button {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 16px 44px;
            font-size: 18px;
        }

        .game-over button:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .game-over button:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .instructions {
            color: #4b5563;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                border-radius: 16px;
            }

            h1 {
                font-size: 36px;
                margin-bottom: 15px;
            }

            .game-info {
                gap: 20px;
                margin-bottom: 20px;
            }

            .score-box, .best-box {
                padding: 16px 24px;
                border-radius: 12px;
            }

            .score-box h3, .best-box h3 {
                font-size: 11px;
            }

            .score-box p, .best-box p {
                font-size: 24px;
            }

            .buttons {
                gap: 10px;
                margin-bottom: 15px;
            }

            button {
                padding: 12px 24px;
                font-size: 14px;
                border-radius: 10px;
            }

            .game-board {
                width: 100%;
                height: 340px;
                padding: 10px;
                gap: 10px;
                margin: 0 auto 30px;
                border-radius: 20px;
            }

            .tile {
                font-size: 28px;
                border-radius: 10px;
            }

            .tile-128,
            .tile-256,
            .tile-512 {
                font-size: 24px;
            }

            .tile-1024,
            .tile-2048 {
                font-size: 20px;
            }

            .tile-4096,
            .tile-8192 {
                font-size: 16px;
            }

            .instructions {
                margin-top: 15px;
                font-size: 12px;
            }

            .game-over {
                padding: 40px 24px;
                min-width: 280px;
                border-radius: 16px;
            }

            .game-over h2 {
                font-size: 28px;
                margin-bottom: 15px;
            }

            .game-over p {
                font-size: 16px;
                margin-bottom: 15px;
            }

            .game-over button {
                padding: 12px 32px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {

            body {
                padding: 0;
                margin: 0;
            }

            .container {
                padding: 20px;
                border-radius: 10px;
                width: 90%;
                margin: 0;
            }

            h1 {
                font-size: 32px;
                margin-bottom: 16px;
                font-weight: 700;
            }

            .game-info {
                flex-direction: row;
                gap: 12px;
                margin-bottom: 16px;
            }

            .score-box, .best-box {
                flex: 1;
                padding: 14px;
                border-radius: 10px;
            }

            .score-box h3, .best-box h3 {
                font-size: 10px;
            }

            .score-box p, .best-box p {
                font-size: 20px;
                margin-top: 3px;
            }

            .buttons {
                gap: 8px;
                margin-bottom: 16px;
            }

            button {
                flex: 1;
                padding: 11px 14px;
                font-size: 13px;
                border-radius: 10px;
            }

            .game-board {
                width: 100%;
                height: 340px;
                padding: 10px;
                gap: 8px;
                margin: 0 auto 20px;
                border-radius: 20px;
            }

            .tile {
                font-size: 24px;
                border-radius: 8px;
            }

            .tile-128,
            .tile-256,
            .tile-512 {
                font-size: 20px;
            }

            .tile-1024,
            .tile-2048 {
                font-size: 17px;
            }

            .tile-4096,
            .tile-8192 {
                font-size: 13px;
            }

            .instructions {
                margin-top: 10px;
                font-size: 11px;
                line-height: 1.4;
            }

            .game-over {
                padding: 28px 18px;
                width: 85%;
                max-width: 290px;
                margin: 0 auto;
                border-radius: 14px;
            }

            .game-over h2 {
                font-size: 24px;
                margin-bottom: 12px;
            }

            .game-over p {
                font-size: 14px;
                margin-bottom: 12px;
            }

            .game-over button {
                width: 100%;
                padding: 11px 22px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        
        <div class="game-info">
            <div class="score-box">
                <h3>SCORE</h3>
                <p id="score">0</p>
            </div>
            <div class="best-box">
                <h3>BEST</h3>
                <p id="best">0</p>
            </div>
        </div>

        <div class="buttons">
            <button id="newGameBtn">New Game</button>
            <button id="undoBtn">Undo</button>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="instructions">
            <p>Use arrow keys or WASD to move tiles</p>
            <p>Combine tiles with the same number to reach 2048</p>
        </div>
    </div>

    <div class="game-over" id="gameOverModal">
        <h2 id="gameOverTitle">Game Over!</h2>
        <p id="gameOverScore">Final Score: 0</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.tiles = [];
                this.score = 0;
                this.best = parseInt(localStorage.getItem('best2048')) || 0;
                this.history = [];
                this.gameOver = false;
                this.won = false;
                this.tileElements = new Map();

                this.scoreEl = document.getElementById('score');
                this.bestEl = document.getElementById('best');
                this.boardEl = document.getElementById('gameBoard');
                this.gameOverEl = document.getElementById('gameOverModal');
                this.gameOverTitle = document.getElementById('gameOverTitle');
                this.gameOverScore = document.getElementById('gameOverScore');

                this.init();
                this.setupEventListeners();
            }

            init() {
                this.tiles = Array(this.size * this.size).fill(0);
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.history = [];
                this.gameOverEl.classList.remove('show');
                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            setupEventListeners() {
                document.getElementById('newGameBtn').addEventListener('click', () => {
                    this.init();
                });

                document.getElementById('undoBtn').addEventListener('click', () => {
                    this.undo();
                });

                document.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        this.handleMove(e.key);
                    } else if (['w', 'W', 's', 'S', 'a', 'A', 'd', 'D'].includes(e.key)) {
                        e.preventDefault();
                        const keyMap = { 'w': 'ArrowUp', 'W': 'ArrowUp', 's': 'ArrowDown', 'S': 'ArrowDown', 'a': 'ArrowLeft', 'A': 'ArrowLeft', 'd': 'ArrowRight', 'D': 'ArrowRight' };
                        this.handleMove(keyMap[e.key]);
                    }
                });

                // Touch/Swipe support for mobile
                let touchStartX = 0;
                let touchStartY = 0;
                
                this.boardEl.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                });

                this.boardEl.addEventListener('touchend', (e) => {
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    const diffX = touchStartX - touchEndX;
                    const diffY = touchStartY - touchEndY;
                    const threshold = 50;

                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        if (diffX > threshold) {
                            this.handleMove('ArrowLeft');
                        } else if (diffX < -threshold) {
                            this.handleMove('ArrowRight');
                        }
                    } else {
                        if (diffY > threshold) {
                            this.handleMove('ArrowUp');
                        } else if (diffY < -threshold) {
                            this.handleMove('ArrowDown');
                        }
                    }
                });
            }

            addRandomTile() {
                const empty = this.tiles.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
                if (empty.length === 0) return;
                const idx = empty[Math.floor(Math.random() * empty.length)];
                this.tiles[idx] = Math.random() < 0.9 ? 2 : 4;
            }

            getRowCol(idx) {
                return [Math.floor(idx / this.size), idx % this.size];
            }

            getIndex(row, col) {
                return row * this.size + col;
            }

            handleMove(direction) {
                if (this.gameOver) return;

                const before = JSON.stringify(this.tiles);
                const scoreBefore = this.score;

                if (direction === 'ArrowLeft') this.moveLeft();
                else if (direction === 'ArrowRight') this.moveRight();
                else if (direction === 'ArrowUp') this.moveUp();
                else if (direction === 'ArrowDown') this.moveDown();

                if (JSON.stringify(this.tiles) !== before) {
                    this.history.push({ tiles: JSON.parse(before), score: scoreBefore });
                    this.render();
                    
                    const wrappers = document.querySelectorAll('.tile-wrapper');
                    wrappers.forEach(wrapper => {
                        wrapper.classList.add('animate');
                        wrapper.addEventListener('animationend', () => {
                            wrapper.classList.remove('animate');
                        }, { once: true });
                    });
                    
                    setTimeout(() => {
                        this.addRandomTile();
                        this.render();

                        if (this.checkWin()) {
                            this.won = true;
                        }
                        if (this.checkGameOver()) {
                            this.gameOver = true;
                            this.showGameOver();
                        }
                    }, 150);
                }
            }

            moveLeft() {
                for (let row = 0; row < this.size; row++) {
                    this.slideMerge(row, 0, 1);
                }
            }

            moveRight() {
                for (let row = 0; row < this.size; row++) {
                    this.slideMerge(row, this.size - 1, -1);
                }
            }

            moveUp() {
                for (let col = 0; col < this.size; col++) {
                    this.slideMergeVertical(col, 0, 1);
                }
            }

            moveDown() {
                for (let col = 0; col < this.size; col++) {
                    this.slideMergeVertical(col, this.size - 1, -1);
                }
            }

            slideMerge(row, startCol, dir) {
                const line = [];
                for (let col = startCol; dir > 0 ? col < this.size : col >= 0; col += dir) {
                    const val = this.tiles[this.getIndex(row, col)];
                    if (val !== 0) line.push(val);
                }

                const merged = this.merge(line);

                let idx = startCol;
                for (let i = 0; i < this.size; i++) {
                    this.tiles[this.getIndex(row, idx)] = merged[i] || 0;
                    idx += dir;
                }
            }

            slideMergeVertical(col, startRow, dir) {
                const line = [];
                for (let row = startRow; dir > 0 ? row < this.size : row >= 0; row += dir) {
                    const val = this.tiles[this.getIndex(row, col)];
                    if (val !== 0) line.push(val);
                }

                const merged = this.merge(line);

                let idx = startRow;
                for (let i = 0; i < this.size; i++) {
                    this.tiles[this.getIndex(idx, col)] = merged[i] || 0;
                    idx += dir;
                }
            }

            merge(line) {
                const result = [];
                let i = 0;
                while (i < line.length) {
                    if (i + 1 < line.length && line[i] === line[i + 1]) {
                        const merged = line[i] * 2;
                        result.push(merged);
                        this.score += merged;
                        i += 2;
                    } else {
                        result.push(line[i]);
                        i++;
                    }
                }
                while (result.length < this.size) {
                    result.push(0);
                }
                return result;
            }

            checkGameOver() {
                if (this.tiles.includes(0)) return false;

                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        const current = this.tiles[this.getIndex(row, col)];
                        if (col < this.size - 1 && current === this.tiles[this.getIndex(row, col + 1)]) return false;
                        if (row < this.size - 1 && current === this.tiles[this.getIndex(row + 1, col)]) return false;
                    }
                }
                return true;
            }

            checkWin() {
                return this.tiles.includes(2048);
            }

            showGameOver() {
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('best2048', this.best);
                    this.bestEl.textContent = this.best;
                }
                this.gameOverTitle.textContent = this.won ? 'You Won!' : 'Game Over!';
                this.gameOverScore.textContent = `Final Score: ${this.score}`;
                this.gameOverEl.classList.add('show');
            }

            undo() {
                if (this.history.length === 0) return;
                const prev = this.history.pop();
                this.tiles = prev.tiles;
                this.score = prev.score;
                this.gameOver = false;
                this.gameOverEl.classList.remove('show');
                this.render();
            }

            render() {
                this.scoreEl.textContent = this.score;
                this.bestEl.textContent = this.best;

                this.boardEl.innerHTML = '';
                for (let i = 0; i < this.size * this.size; i++) {
                    const container = document.createElement('div');
                    container.className = 'tile-container';

                    if (this.tiles[i] !== 0) {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'tile-wrapper';
                        wrapper.setAttribute('data-index', i);

                        const tile = document.createElement('div');
                        tile.className = `tile tile-${this.tiles[i]}`;
                        tile.textContent = this.tiles[i];
                        
                        wrapper.appendChild(tile);
                        container.appendChild(wrapper);
                    }
                    this.boardEl.appendChild(container);
                }
            }
        }

        const game = new Game2048();
    </script>
</body>
</html>
